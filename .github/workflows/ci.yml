name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:8
        ports: ['27017:27017']
      redis:
        image: redis:7
        ports: ['6379:6379']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install types package
        run: cd packages/types && npm ci && npm run build

      - name: Install frontend deps
        run: npm ci

      - name: Install backend deps
        run: cd backend && npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Frontend tests
        run: npm run test:frontend

      - name: Backend tests
        env:
          NODE_ENV: test
          DATABASE_URL: mongodb://localhost:27017/vsaas_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-jwt-secret-min-64-chars-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
          JWT_REFRESH_SECRET: test-refresh-secret-min-64-chars-aaaaaaaaaaaaaaaaaaaaaaaaaaaa
          PORTAL_JWT_SECRET: test-portal-secret-min-64-chars-aaaaaaaaaaaaaaaaaaaaaaaaaaaa
          FRONTEND_URL: http://localhost:3000
        run: cd backend && npm run test:ci
